<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cumple de Enzo</title>

<style>

body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    font-family:Arial, sans-serif;
}

.wrap{
    position:relative;
    width:100%;
    max-width:480px;
}

.base{
    width:100%;
    display:block;
}

/* CAMPO NOMBRE */

#nombre{
    position:absolute;
    left:20%;
    top:71%;
    width:60%;
    height:5%;
    border:none;
    background:transparent;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    outline:none;
}

/* BOTONES */

.boton{
    position:absolute;
    left:12%;
    width:76%;
    height:6%;
    border:none;
    background:transparent;
    cursor:pointer;
}

#si{
    top:79%;
}

#no{
    top:88%;
}

/* MENSAJE FINAL */

#mensaje{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    z-index:999;
    padding:20px;
}

</style>
</head>

<body>

<div class="wrap">

<img src="invitacion.png" class="base">

<input
id="nombre"
type="text"
placeholder="Nombre del niño/a">

<button
class="boton"
id="si"
onclick="enviarRespuesta('Acepto la misión')">
</button>

<button
class="boton"
id="no"
onclick="enviarRespuesta('Oh no, no puedo')">
</button>

</div>

<div id="mensaje"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzqS0J-SyQVapLJa5QytrDVAVi6d7OblPuKkwccUqKR4_MiWq8G7EqGMKmv0w0T0qQr/exec";

function enviarRespuesta(respuesta){

    const nombre =
    document.getElementById("nombre")
    .value
    .trim();

    if(!nombre){
        alert("Escribe el nombre del niño/a");
        return;
    }

    fetch(SCRIPT_URL,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify({
            nombre:nombre,
            respuesta:respuesta
        })
    });

    const mensaje =
    document.getElementById("mensaje");

    mensaje.style.display="flex";

    if(respuesta==="Acepto la misión"){
        mensaje.innerHTML=
        "✅ ¡Misión aceptada!<br><br>Respuesta guardada.";
    }else{
        mensaje.innerHTML=
        "❌ ¡Gracias por avisar!<br><br>Respuesta guardada.";
    }
}

</script>

</body>
</html>
